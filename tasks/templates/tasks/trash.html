{% extends "tasks/base.html" %}
{% block title %}Šiukšlinė{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3">
  <h1 class="h4 m-0">Šiukšlinė</h1>
  <a class="btn btn-outline-secondary btn-sm" href="{% url 'tasks:task_list' %}">Atgal</a>
</div>

{% if tasks %}
  <div class="list-group">
    {% for t in tasks %}
      <div class="list-group-item d-flex justify-content-between align-items-start gap-3">
        <div>
          <div class="fw-semibold">{{ t.title }}</div>
          <div class="text-muted small">Ištrinta: {{ t.deleted_at|date:"Y-m-d H:i" }}</div>
        </div>

        <form method="post" action="{% url 'tasks:task_restore' t.pk %}" class="m-0">
          {% csrf_token %}
          <button class="btn btn-success btn-sm" type="submit">Atstatyti</button>
        </form>
      </div>
    {% endfor %}
  </div>
{% else %}
  <div class="alert alert-info mb-0">Šiukšlinė tuščia.</div>
{% endif %}
{% endblock %}
